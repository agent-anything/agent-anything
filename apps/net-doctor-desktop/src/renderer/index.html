<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDoctor</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main>
      <header>
        <h1>NetDoctor</h1>
      </header>

      <form id="diagnosis-form">
        <label>
          Target
          <input id="target" name="target" value="https://example.com" required>
        </label>
        <label>
          Symptom
          <input id="symptom" name="symptom" value="Browser cannot reach the service.">
        </label>
        <label>
          Permission
          <select id="permission" name="permission">
            <option value="approve-for-me" selected>Approve for me</option>
            <option value="ask-for-approval">Ask for approval</option>
            <option value="full-access">Full access</option>
          </select>
        </label>
        <button id="run" type="submit">Run Diagnosis</button>
      </form>

      <section>
        <h2>Progress</h2>
        <ul id="progress"></ul>
      </section>

      <section id="result" class="result"></section>
    </main>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
